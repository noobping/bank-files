id: io.github.noobping.BankFiles
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk

sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

command: bank-files

finish-args:
  - --device=dri
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland

modules:
  - name: bank-files
    buildsystem: simple

    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/bank-files/cargo

    build-commands:
      - sed -i '/\[target.\x27cfg(target_os = "windows")\x27.*ependencies\]/,/^$/d' Cargo.toml
      - BANK_FILES_DATADIR=/app/share BANK_FILES_INSTALLED_RESOURCES=1 BANK_FILES_GRESOURCE=/app/share/bank-files/bank-files.gresource cargo build --offline --release --features flatpak
      - install -Dm0755 target/release/bank-files /app/bin/bank-files
      - install -dm0755 /app/share/bank-files
      - glib-compile-resources --sourcedir=data --target=/app/share/bank-files/bank-files.gresource data/resources.xml
      - install -Dm0644 data/scalable/apps/${FLATPAK_ID}.svg /app/share/icons/hicolor/scalable/apps/${FLATPAK_ID}.svg
      - install -Dm0644 data/symbolic/apps/${FLATPAK_ID}-symbolic.svg /app/share/icons/hicolor/symbolic/apps/${FLATPAK_ID}-symbolic.svg
      - install -dm0755 /app/share/icons/hicolor/symbolic/actions
      - cp -a data/symbolic/actions/. /app/share/icons/hicolor/symbolic/actions/
      - install -Dm0644 data/bank-files-search-provider.ini /app/share/gnome-shell/search-providers/${FLATPAK_ID}.search-provider.ini
      - install -Dm0644 data/bank-files-search-provider.service /app/share/dbus-1/services/${FLATPAK_ID}.SearchProvider.service
      - install -Dm0644 data/${FLATPAK_ID}.gschema.xml /app/share/glib-2.0/schemas/${FLATPAK_ID}.gschema.xml
      - glib-compile-schemas /app/share/glib-2.0/schemas
      - install -Dm0644 data/metainfo.xml /app/share/metainfo/${FLATPAK_ID}.metainfo.xml
      - install -Dm0644 data/${FLATPAK_ID}.desktop /app/share/applications/${FLATPAK_ID}.desktop
      - install -Dm0644 po/nl.po /app/share/bank-files/po/nl.po
      - install -Dm0644 po/de.po /app/share/bank-files/po/de.po
      - install -Dm0644 po/LINGUAS /app/share/bank-files/po/LINGUAS
      - install -Dm0644 po/POTFILES /app/share/bank-files/po/POTFILES
      - msgattrib --no-obsolete --empty po/nl.po -o /app/share/bank-files/po/bank-files.pot
      - install -dm0755 /app/share/locale/nl/LC_MESSAGES /app/share/locale/de/LC_MESSAGES
      - msgfmt po/nl.po -o /app/share/locale/nl/LC_MESSAGES/bank-files.mo
      - msgfmt po/de.po -o /app/share/locale/de/LC_MESSAGES/bank-files.mo

    sources:
      - type: git
        url: https://github.com/noobping/bank-files.git
        commit: 9fb96a885643fe35774e65f7ea9cce90ba510022
      - cargo-sources.yml
