name: Download AI assets

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to update. Defaults to the branch used to run the workflow.
        required: false
        type: string
      classifier_url:
        description: URL for data/ai/classifier.onnx. Falls back to BANK_FILES_AI_CLASSIFIER_URL.
        required: false
        type: string
      generator_url:
        description: URL for data/ai/generator.safetensors. Falls back to BANK_FILES_AI_GENERATOR_URL.
        required: false
        type: string
      tokenizer_url:
        description: URL for data/ai/tokenizer.json. Falls back to BANK_FILES_AI_TOKENIZER_URL.
        required: false
        type: string
      model_json_url:
        description: URL for data/ai/model.json. Falls back to BANK_FILES_AI_MODEL_JSON_URL.
        required: false
        type: string
      license_url:
        description: URL for data/ai/LICENSE. Falls back to BANK_FILES_AI_LICENSE_URL.
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: download-ai-assets-${{ github.ref }}
  cancel-in-progress: false

jobs:
  download-ai-assets:
    name: Download and commit AI assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref_name }}
          fetch-depth: 0

      - name: Download assets
        shell: bash
        env:
          INPUT_CLASSIFIER_URL: ${{ inputs.classifier_url }}
          INPUT_GENERATOR_URL: ${{ inputs.generator_url }}
          INPUT_TOKENIZER_URL: ${{ inputs.tokenizer_url }}
          INPUT_MODEL_JSON_URL: ${{ inputs.model_json_url }}
          INPUT_LICENSE_URL: ${{ inputs.license_url }}
          VAR_CLASSIFIER_URL: ${{ vars.BANK_FILES_AI_CLASSIFIER_URL }}
          VAR_GENERATOR_URL: ${{ vars.BANK_FILES_AI_GENERATOR_URL }}
          VAR_TOKENIZER_URL: ${{ vars.BANK_FILES_AI_TOKENIZER_URL }}
          VAR_MODEL_JSON_URL: ${{ vars.BANK_FILES_AI_MODEL_JSON_URL }}
          VAR_LICENSE_URL: ${{ vars.BANK_FILES_AI_LICENSE_URL }}
          SECRET_CLASSIFIER_URL: ${{ secrets.BANK_FILES_AI_CLASSIFIER_URL }}
          SECRET_GENERATOR_URL: ${{ secrets.BANK_FILES_AI_GENERATOR_URL }}
          SECRET_TOKENIZER_URL: ${{ secrets.BANK_FILES_AI_TOKENIZER_URL }}
          SECRET_MODEL_JSON_URL: ${{ secrets.BANK_FILES_AI_MODEL_JSON_URL }}
          SECRET_LICENSE_URL: ${{ secrets.BANK_FILES_AI_LICENSE_URL }}
        run: |
          set -euo pipefail

          resolve_url() {
            local input_value="$1"
            local variable_value="$2"
            local secret_value="$3"
            local asset_name="$4"

            if [ -n "$input_value" ]; then
              printf '%s' "$input_value"
            elif [ -n "$variable_value" ]; then
              printf '%s' "$variable_value"
            elif [ -n "$secret_value" ]; then
              printf '%s' "$secret_value"
            else
              echo "Missing URL for ${asset_name}. Provide a workflow input, repo variable, or secret." >&2
              exit 1
            fi
          }

          classifier_url="$(resolve_url "$INPUT_CLASSIFIER_URL" "$VAR_CLASSIFIER_URL" "$SECRET_CLASSIFIER_URL" classifier.onnx)"
          generator_url="$(resolve_url "$INPUT_GENERATOR_URL" "$VAR_GENERATOR_URL" "$SECRET_GENERATOR_URL" generator.safetensors)"
          tokenizer_url="$(resolve_url "$INPUT_TOKENIZER_URL" "$VAR_TOKENIZER_URL" "$SECRET_TOKENIZER_URL" tokenizer.json)"
          model_json_url="$(resolve_url "$INPUT_MODEL_JSON_URL" "$VAR_MODEL_JSON_URL" "$SECRET_MODEL_JSON_URL" model.json)"
          license_url="$(resolve_url "$INPUT_LICENSE_URL" "$VAR_LICENSE_URL" "$SECRET_LICENSE_URL" LICENSE)"

          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT

          download_asset() {
            local url="$1"
            local output="$2"
            local name="$3"

            echo "Downloading ${name}..."
            local curl_args=(
              --fail
              --location
              --retry 3
              --retry-delay 5
              --show-error
              --silent
              --output "$output"
              "$url"
            )
            curl "${curl_args[@]}"
            test -s "$output"
          }

          download_asset "$classifier_url" "$tmp_dir/classifier.onnx" classifier.onnx
          download_asset "$generator_url" "$tmp_dir/generator.safetensors" generator.safetensors
          download_asset "$tokenizer_url" "$tmp_dir/tokenizer.json" tokenizer.json
          download_asset "$model_json_url" "$tmp_dir/model.json" model.json
          download_asset "$license_url" "$tmp_dir/LICENSE" LICENSE

          mkdir -p data/ai
          install -m 0644 "$tmp_dir/classifier.onnx" data/ai/classifier.onnx
          install -m 0644 "$tmp_dir/generator.safetensors" data/ai/generator.safetensors
          install -m 0644 "$tmp_dir/tokenizer.json" data/ai/tokenizer.json
          install -m 0644 "$tmp_dir/model.json" data/ai/model.json
          install -m 0644 "$tmp_dir/LICENSE" data/ai/LICENSE

      - name: Validate downloaded bundle
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          root = Path('data/ai')
          required = [
              'classifier.onnx',
              'generator.safetensors',
              'tokenizer.json',
              'model.json',
              'LICENSE',
          ]

          for name in required:
              path = root / name
              if not path.is_file() or path.stat().st_size == 0:
                  raise SystemExit(f'{path} is missing or empty')

          model = json.loads((root / 'model.json').read_text(encoding='utf-8'))
          if model.get('placeholder') is True:
              raise SystemExit('data/ai/model.json still marks the bundle as a placeholder')

          tokenizer = json.loads((root / 'tokenizer.json').read_text(encoding='utf-8'))
          if isinstance(tokenizer, dict) and tokenizer.get('placeholder') is True:
              raise SystemExit('data/ai/tokenizer.json still marks the bundle as a placeholder')
          PY

      - name: Commit changes
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- data/ai; then
            echo "AI assets are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ai
          git commit -m "Update local AI model assets"
          git push
